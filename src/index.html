<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Contribution Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="widget" class="widget">
    <!-- Drag handle area -->
    <div class="drag-handle" id="dragHandle"></div>

    <!-- Title bar -->
    <div class="title-bar">
      <div class="title-left">
        <svg class="github-icon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span class="title-text" id="titleText">Contributions</span>
      </div>
      <div class="title-right">
        <button class="btn-icon btn-refresh" id="btnRefresh" title="Refresh">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor">
            <path d="M8 3a5 5 0 104.546 2.914.5.5 0 01.908-.418A6 6 0 118 2v1z"/>
            <path d="M8 4.466V.534a.25.25 0 01.41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 018 4.466z"/>
          </svg>
        </button>
        <button class="btn-icon btn-settings" id="btnSettings" title="Settings">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor">
            <path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z"/>
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.892 3.434-.901 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.892-1.64-.901-3.434-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 002.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 001.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 00-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 00-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 00-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 001.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 003.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 002.692-1.115l.094-.319z"/>
          </svg>
        </button>
        <button class="btn-icon btn-close" id="btnClose" title="Close">
          <svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor">
            <path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Month labels -->
    <div class="months-row" id="monthsRow"></div>

    <!-- Contribution grid -->
    <div class="graph-container">
      <div class="day-labels">
        <span></span>
        <span>Mon</span>
        <span></span>
        <span>Wed</span>
        <span></span>
        <span>Fri</span>
        <span></span>
      </div>
      <div class="graph-grid" id="graphGrid"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="legend">
        <span class="legend-label">Less</span>
        <span class="legend-cell" data-level="0"></span>
        <span class="legend-cell" data-level="1"></span>
        <span class="legend-cell" data-level="2"></span>
        <span class="legend-cell" data-level="3"></span>
        <span class="legend-cell" data-level="4"></span>
        <span class="legend-label">More</span>
      </div>
      <div class="status" id="statusText">Ready</div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Settings panel (overlay) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-title">Settings</div>
      <div class="settings-field">
        <label for="inputUsername">GitHub Username</label>
        <input type="text" id="inputUsername" placeholder="e.g. octocat" spellcheck="false" />
      </div>
      <div class="settings-field">
        <label for="inputToken">Personal Access Token <span class="optional">(optional)</span></label>
        <input type="password" id="inputToken" placeholder="ghp_xxxxxxxxxxxx" spellcheck="false" />
      </div>
      <div class="settings-actions">
        <button class="btn btn-cancel" id="btnCancelSettings">Cancel</button>
        <button class="btn btn-save" id="btnSaveSettings">Save & Refresh</button>
      </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <span>Fetching contributions…</span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
